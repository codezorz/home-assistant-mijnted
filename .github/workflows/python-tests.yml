name: Python Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            custom_components/mijnted/manifest.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/mijnted/manifest.json", encoding="utf-8") as file:
              manifest = json.load(file)

          requirements = manifest.get("requirements", [])
          if requirements:
              subprocess.check_call([sys.executable, "-m", "pip", "install", *requirements])
          PY

      - name: Syntax check
        run: python -m compileall custom_components/mijnted

      - name: Run test suite
        run: pytest -q --junitxml=pytest-results.xml

      - name: Publish test report
        if: (success() || failure()) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        with:
          name: Pytest Results
          path: pytest-results.xml
          reporter: java-junit
